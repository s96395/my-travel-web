<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅程詳情 | VoyageArchive</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">VOYAGE<span>ARCHIVE</span></a>
            <div class="nav-links"><a href="index.html">返回我的旅程</a></div>
        </div>
    </nav>

    <div id="trip-details" style="display:none;">
        <header class="hero" id="hero-banner" style="margin-bottom: 0; height: 320px;">
            <div class="container">
                <h1 id="trip-title">載入中...</h1>
                <p id="trip-subtitle"></p>
            </div>
        </header>

        <div class="container trip-main-grid" style="display: grid; grid-template-columns: 1fr 350px; gap: 30px; margin-top: 40px;">
            <div class="main-content">
                <section class="card">
                    <div class="card-header"><h2>每日行程</h2><button class="btn btn-primary" id="addDayBtn">＋ 新增行程</button></div>
                    <div id="itinerary-timeline"></div>
                </section>
                <section class="card">
                    <div class="card-header"><h2>旅程相簿</h2><button class="btn btn-primary" id="addImageBtn">＋ 新增相片</button></div>
                    <div id="photo-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px;"></div>
                </section>
            </div>

            <aside class="sidebar">
                <div class="card" style="background: var(--primary); color: white; text-align: center;">
                    <h4 style="margin-bottom:10px;">旅伴共編</h4>
                    <p style="font-size: 0.8rem; opacity: 0.8; margin-bottom: 15px;">分享網址即可一起規劃旅程</p>
                    <button class="btn" style="background:white; color:var(--primary); width:100%;" id="copyLinkBtn">複製分享連結</button>
                </div>
                <section class="card">
                    <div class="card-header"><h4>支出分析</h4></div>
                    <canvas id="expenseChart" width="250" height="250"></canvas>
                    <div id="total-expense" style="text-align:center; margin-top:20px; font-size:1.8rem; color:var(--primary);">$0</div>
                    <div id="expense-list" style="margin-top:20px;"></div>
                    <button class="btn btn-primary" id="addExpenseBtn" style="width:100%; margin-top: 15px;">＋ 紀錄支出</button>
                </section>
                <section class="card" style="border: 1px solid #ffcccc;">
                    <h4 style="color: #e74c3c;">危險區域</h4>
                    <button class="btn" id="deleteTripBtn" style="background:#e74c3c; color:white; width:100%; margin-top:10px;">刪除整趟旅程</button>
                </section>
            </aside>
        </div>
    </div>

    <div id="universalModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2 id="modalTitle" style="margin-bottom: 25px;">編輯項目</h2>
            <form id="modalForm"><div id="modalBody"></div><button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 25px;">儲存變更</button></form>
        </div>
    </div>

    <script type="module" src="trip.js"></script>
</body>
</html>
