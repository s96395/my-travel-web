<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅程詳情 | VoyageArchive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">VOYAGE<span>ARCHIVE</span></a>
            <div class="nav-links"><a href="index.html">我的旅程</a></div>
        </div>
    </nav>

    <div id="trip-details" style="display:none;">
        <header class="hero" id="inner-hero" style="margin-bottom: 0; height: 350px;">
            <div class="container">
                <h1 id="trip-title">載入中...</h1>
                <p id="trip-subtitle" style="opacity: 0.8;"></p>
            </div>
        </header>

        <!-- 旅程摘要卡 -->
        <div class="container" style="margin-top: 40px; margin-bottom: 0;">
            <div class="card trip-summary-card">
                <div class="trip-summary-body" id="trip-summary-display">
                    <!-- 由 JS 渲染 -->
                </div>
                <div class="trip-summary-actions">
                    <button class="btn btn-outline" id="editTripInfoBtn">✏️ 編輯旅程資料</button>
                </div>
            </div>
        </div>

        <!-- 上方兩欄：出發前準備 + 側邊欄 -->
        <div class="container trip-top-grid" style="margin-top: 30px;">
            <div>
                <!-- 出發前準備清單 -->
                <section class="card">
                    <div class="card-header">
                        <div>
                            <h2>出發前準備</h2>
                            <p id="todo-progress-text" style="font-size:0.85rem; color:var(--text-muted); margin-top:4px; font-weight:400;">載入中...</p>
                        </div>
                        <button class="btn btn-primary" id="addTodoBtn" style="padding: 8px 20px; font-size: 0.8rem;">＋ 新增</button>
                    </div>
                    <div class="todo-progress-bar-wrap">
                        <div class="todo-progress-bar" id="todo-progress-bar"></div>
                    </div>
                    <div id="todo-list"></div>
                    <div id="todo-templates" style="margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border-color);">
                        <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:10px; font-weight:400;">快速新增範本：</p>
                        <div class="todo-template-chips" id="todo-template-chips"></div>
                    </div>
                </section>
            </div>

            <aside class="sidebar">
                <div class="card" style="background: var(--primary); color: white; text-align: center;">
                    <h4 style="margin-bottom:10px;">旅伴共編</h4>
                    <p style="font-size: 0.8rem; opacity: 0.8; margin-bottom: 15px;">分享此網址即可一起規劃旅程</p>
                    <button class="btn" style="background:white; color:var(--primary); width:100%;" id="copyLinkBtn">複製分享連結</button>
                </div>
                <!-- 刪除旅程按鈕 -->
                <section class="card" style="border: 1px solid #ffcccc; background: #fffafb;">
                    <h4 style="color: #e74c3c; margin-bottom: 10px;">危險區域</h4>
                    <button class="btn" id="deleteTripBtn" style="background:#e74c3c; color:white; width:100%; font-size:0.8rem;">刪除整趟旅程</button>
                </section>
            </aside>
        </div>

        <!-- 全寬區塊：每日行程、總支出、相簿 -->
        <div class="container" style="margin-top: 0;">
            <section class="card">
                <div class="card-header"><h2>每日行程</h2><button class="btn btn-primary" id="addDayBtn" style="padding: 8px 20px; font-size: 0.8rem;">＋ 新增項目</button></div>
                <div id="itinerary-timeline"></div>
            </section>

            <section class="card">
                <div class="card-header">
                    <div>
                        <h2>旅行總支出</h2>
                        <p id="total-expense" style="font-size:0.9rem; color:var(--accent); margin-top:4px; font-weight:600;">$0</p>
                    </div>
                    <button class="btn btn-primary" id="addExpenseBtn" style="padding: 8px 20px; font-size: 0.8rem;">＋ 新增支出</button>
                </div>
                <div style="overflow-x:auto;">
                    <table class="expense-table">
                        <thead>
                            <tr>
                                <th>項目</th>
                                <th>分類</th>
                                <th>金額</th>
                                <th>付款方式</th>
                                <th>備註</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="expense-list"></tbody>
                        <tfoot>
                            <tr>
                                <td colspan="2" class="expense-table-total-label">總計</td>
                                <td id="expense-total-foot" class="expense-table-total-amt">$0</td>
                                <td colspan="3"></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
                <div id="expense-bar-chart" class="expense-bar-chart"></div>
            </section>

            <section class="card">
                <div class="card-header"><h2>旅程相簿</h2><button class="btn btn-primary" id="addImageBtn" style="padding: 8px 20px; font-size: 0.8rem;">＋ 新增網址</button></div>
                <div id="photo-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px;"></div>
            </section>
        </div>
    </div>

    <!-- 通用彈窗 -->
    <div id="universalModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2 id="modalTitle" style="margin-bottom: 25px; color: var(--primary);">編輯項目</h2>
            <form id="modalForm"><div id="modalBody"></div><button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 25px;">儲存並同步</button></form>
        </div>
    </div>

    <script type="module" src="trip.js"></script>
</body>
</html>
