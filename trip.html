<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅程詳情 | VoyageArchive</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">VOYAGE ARCHIVE</a>
            <div class="nav-links"><a href="index.html">返回我的旅程</a></div>
        </div>
    </nav>

    <div id="trip-details" style="display:none;">
        <header class="trip-hero">
            <img id="trip-cover" src="" alt="Cover Image">
            <div class="hero-info">
                <h1 id="trip-title">載入中...</h1>
                <p id="trip-subtitle"></p>
            </div>
        </header>

        <div class="container trip-container">
            <div class="main-content">
                <section class="card">
                    <div class="card-header">
                        <h2 style="font-family: var(--serif-font); font-style: italic;">Itinerary</h2>
                        <button class="btn btn-primary" id="addDayBtn" style="padding: 8px 20px; font-size: 0.8rem;">＋ 新增行程</button>
                    </div>
                    <div id="itinerary-timeline"></div>
                </section>

                <section class="card">
                    <div class="card-header">
                        <h2 style="font-family: var(--serif-font); font-style: italic;">Memories</h2>
                        <button class="btn btn-primary" id="addImageBtn" style="padding: 8px 20px; font-size: 0.8rem;">＋ 照片網址</button>
                    </div>
                    <div id="photo-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px;"></div>
                </section>
            </div>

            <aside class="sidebar">
                <!-- 找回複製分享連結按鈕 -->
                <div class="card" style="background: var(--primary); color: white; text-align: center;">
                    <h4 style="margin-bottom:15px; font-family: var(--serif-font); font-style: italic;">Collaborate</h4>
                    <button class="btn" style="background:white; color:var(--primary); width:100%;" id="copyLinkBtn">複製分享連結</button>
                </div>

                <section class="card">
                    <div class="card-header"><h4 style="font-family: var(--serif-font); font-style: italic;">Financials</h4></div>
                    <canvas id="expenseChart" width="200" height="200"></canvas>
                    <div id="total-expense" style="text-align:center; margin-top:15px; font-weight:800; font-size:1.2rem;">$0</div>
                    <div id="expense-list" style="margin-top:20px;"></div>
                    <button class="btn btn-primary" style="width:100%; font-size:0.8rem; margin-top: 15px;" id="addExpenseBtn">＋ 新增支出</button>
                </section>
            </aside>
        </div>
    </div>

    <!-- 通用彈窗 (修正了 X 按鈕的位置與輸入框樣式) -->
    <div id="universalModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <div class="modal-header">
                <h2 id="modalTitle">標題</h2>
            </div>
            <form id="modalForm">
                <div id="modalBody"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">儲存內容</button>
            </form>
        </div>
    </div>

    <script type="module" src="trip.js"></script>
</body>
</html>
