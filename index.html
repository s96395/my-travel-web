<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoyageArchive | 私人旅程作品集</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">VOYAGE ARCHIVE</a>
            <div class="nav-links">
                <a href="index.html">My Journeys</a>
                <a href="history.html">Archives</a>
                <button class="btn btn-primary" id="openAddModal">＋ 新增旅程</button>
            </div>
        </div>
    </nav>

    <header class="hero container">
        <h1>Explore, Then Archive.</h1>
        <p>每一段回憶，都值得以最高規格的數位檔案形式珍藏。</p>
    </header>

    <main class="container">
        <!-- 統計數據 -->
        <section class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Total Trips</span>
                <span class="stat-value" id="stat-total">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Planning</span>
                <span class="stat-value" id="stat-planning">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Completed</span>
                <span class="stat-value" id="stat-completed">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Expenses</span>
                <span class="stat-value" id="stat-expense">$0</span>
            </div>
        </section>

        <!-- 搜尋功能 -->
        <section class="filter-section">
            <input type="text" id="searchInput" placeholder="搜尋目的地、國家、或是一段過往回憶...">
        </section>

        <!-- 旅程展示網格 -->
        <section class="trip-grid" id="tripGrid"></section>
    </main>

    <!-- 新增旅程彈窗 -->
    <div id="addTripModal" class="modal">
        <div class="modal-content">
            <h2 style="font-family: var(--serif-font); margin-bottom: 25px; font-style: italic;">Create New Journey</h2>
            <form id="addTripForm">
                <div style="margin-bottom:15px;">
                    <label style="display:block;font-size:0.8rem;margin-bottom:5px;">旅程標題</label>
                    <input type="text" name="title" placeholder="例如：2026 沖繩初夏之旅" required style="width:100%;padding:12px;border:1px solid #eee;border-radius:8px;">
                </div>
                
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <div style="flex:1;">
                        <label style="display:block;font-size:0.8rem;margin-bottom:5px;">國家</label>
                        <input type="text" name="country" required style="width:100%;padding:12px;border:1px solid #eee;border-radius:8px;">
                    </div>
                    <div style="flex:1;">
                        <label style="display:block;font-size:0.8rem;margin-bottom:5px;">城市</label>
                        <input type="text" name="city" style="width:100%;padding:12px;border:1px solid #eee;border-radius:8px;">
                    </div>
                </div>

                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <div style="flex:1;">
                        <label style="display:block;font-size:0.8rem;margin-bottom:5px;">開始日期</label>
                        <input type="date" name="startDate" required style="width:100%;padding:12px;border:1px solid #eee;border-radius:8px;">
                    </div>
                    <div style="flex:1;">
                        <label style="display:block;font-size:0.8rem;margin-bottom:5px;">結束日期</label>
                        <input type="date" name="endDate" required style="width:100%;padding:12px;border:1px solid #eee;border-radius:8px;">
                    </div>
                </div>

                <div style="margin-bottom:15px;">
                    <label style="display:block;font-size:0.8rem;margin-bottom:5px;">封面網址 (建議使用直式圖片)</label>
                    <input type="url" name="coverImageUrl" placeholder="https://..." style="width:100%;padding:12px;border:1px solid #eee;border-radius:8px;">
                </div>

                <div style="margin-bottom:20px;">
                    <label style="display:block;font-size:0.8rem;margin-bottom:5px;">旅程狀態</label>
                    <select name="status" style="width:100%;padding:12px;border:1px solid #eee;border-radius:8px;">
                        <option value="規劃中">規劃中</option>
                        <option value="即將出發">即將出發</option>
                        <option value="已完成">已完成</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%;">建立並開啟檔案</button>
                <p id="closeAddModal" style="text-align:center; margin-top:15px; cursor:pointer; color:var(--text-muted); font-size:0.9rem;">取消</p>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
