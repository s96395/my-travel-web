<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoyageArchive | 私人旅程檔案館</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">VOYAGE ARCHIVE</a>
            <div class="nav-links">
                <a href="index.html">My Journeys</a>
                <a href="history.html">Archives</a>
                <button class="btn btn-primary" id="openAddModal">＋ 新增旅程</button>
            </div>
        </div>
    </nav>

    <header class="hero container">
        <h1>Explore, Then Archive.</h1>
        <p>每一段精彩的自由行，都值得被優雅地保存。</p>
    </header>

    <main class="container">
        <!-- 旅程展示網格 -->
        <section class="trip-grid" id="tripGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; padding-bottom: 100px;"></section>
    </main>

    <!-- 新增旅程彈窗 -->
    <div id="addTripModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeAddModal">&times;</span>
            <div class="modal-header">
                <h2>Create Journey</h2>
            </div>
            <form id="addTripForm">
                <div class="form-group">
                    <label>旅程名稱</label>
                    <input type="text" name="title" placeholder="例如：2026 沖繩初夏自駕" required>
                </div>
                
                <div style="display:flex; gap:15px;">
                    <div class="form-group" style="flex:1;"><label>國家</label><input type="text" name="country" required></div>
                    <div class="form-group" style="flex:1;"><label>城市</label><input type="text" name="city"></div>
                </div>

                <div style="display:flex; gap:15px;">
                    <div class="form-group" style="flex:1;"><label>開始日期</label><input type="date" name="startDate" required></div>
                    <div class="form-group" style="flex:1;"><label>結束日期</label><input type="date" name="endDate" required></div>
                </div>

                <div class="form-group">
                    <label>封面網址 (建議使用直式圖)</label>
                    <input type="url" name="coverImageUrl" placeholder="https://...">
                </div>

                <div class="form-group">
                    <label>狀態</label>
                    <select name="status">
                        <option value="規劃中">規劃中</option>
                        <option value="即將出發">即將出發</option>
                        <option value="已完成">已完成</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%; margin-top: 10px;">建立檔案</button>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
