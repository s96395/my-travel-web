<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoyageArchive | 我的旅程作品集</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">VOYAGE<span>ARCHIVE</span></a>
            <div class="nav-links">
                <a href="index.html">我的旅程</a>
                <a href="history.html">歷史存檔</a>
                <button class="btn btn-primary" id="openAddModal">＋ 新增旅程</button>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>探索，然後收藏。</h1>
            <p>將您的每一段自由行，轉化為永恆的數位檔案。</p>
        </div>
    </header>

    <main class="container">
        <section class="stats-grid">
            <div class="stat-card"><span class="stat-value" id="stat-total">0</span><span class="stat-label">總旅程數</span></div>
            <div class="stat-card"><span class="stat-value" id="stat-planning">0</span><span class="stat-label">規劃中</span></div>
            <div class="stat-card"><span class="stat-value" id="stat-completed">0</span><span class="stat-label">已完成</span></div>
            <div class="stat-card"><span class="stat-value" id="stat-expense">$0</span><span class="stat-label">累計支出</span></div>
        </section>

        <section class="filter-section">
            <input type="text" id="searchInput" placeholder="搜尋國家、城市或旅程名稱...">
        </section>

        <section class="trip-grid" id="tripGrid"></section>
    </main>

    <div id="addTripModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeAddModal">&times;</span>
            <h2 style="margin-bottom: 30px; color: var(--primary);">建立新旅程</h2>
            <form id="addTripForm">
                <div class="form-group"><label>旅程標題</label><input type="text" name="title" placeholder="例如：2026 沖繩初夏之旅" required></div>
                <div style="display:flex; gap:15px;">
                    <div class="form-group" style="flex:1;"><label>國家</label><input type="text" name="country" required></div>
                    <div class="form-group" style="flex:1;"><label>城市</label><input type="text" name="city"></div>
                </div>
                <div style="display:flex; gap:15px;">
                    <div class="form-group" style="flex:1;"><label>開始日期</label><input type="date" name="startDate" required></div>
                    <div class="form-group" style="flex:1;"><label>結束日期</label><input type="date" name="endDate" required></div>
                </div>
                <div class="form-group"><label>封面圖片網址</label><input type="url" name="coverImageUrl" placeholder="建議使用橫向 16:9 圖片"></div>
                <div class="form-group">
                    <label>旅程狀態</label>
                    <select name="status">
                        <option value="規劃中">規劃中</option><option value="即將出發">即將出發</option><option value="已完成">已完成</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; height: 55px; font-size: 1.1rem;">確認建立</button>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
