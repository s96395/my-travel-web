<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoyageArchive | 我的旅程作品集</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">VOYAGE<span>ARCHIVE</span></a>
            <div class="nav-links">
                <a href="index.html">我的旅程</a>
                <a href="history.html">歷史存檔</a>
                <button class="btn btn-primary" id="openAddModal">＋ 新增旅程</button>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>探索，然後收藏。</h1>
            <p>將你的每一段自由行，轉化為永恆的數位檔案。</p>
        </div>
    </header>

    <main class="container">
        <section class="stats-grid" id="statsContainer">
            <div class="stat-card">
                <span class="stat-value" id="stat-total">0</span>
                <span class="stat-label">總旅程數</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="stat-planning">0</span>
                <span class="stat-label">規劃中</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="stat-completed">0</span>
                <span class="stat-label">已完成</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="stat-expense">$0</span>
                <span class="stat-label">累計支出</span>
            </div>
        </section>

        <section class="filter-section">
            <input type="text" id="searchInput" placeholder="搜尋國家、城市或名稱...">
            <select id="statusFilter">
                <option value="all">所有狀態</option>
                <option value="規劃中">規劃中</option>
                <option value="即將出發">即將出發</option>
                <option value="已完成">已完成</option>
            </select>
        </section>

        <section class="trip-grid" id="tripGrid">
            </section>
    </main>

    <div id="addTripModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>開啟新旅程</h2>
                <span class="close" id="closeAddModal">&times;</span>
            </div>
            <form id="addTripForm">
                <div class="form-group">
                    <label>旅程名稱</label>
                    <input type="text" name="title" placeholder="例如：2026 沖繩自駕初夏之旅" required>
                </div>
                
                <div class="form-row" style="display: flex; gap: 10px; margin-bottom: 18px;">
                    <div style="flex: 1;">
                        <label style="display: block; font-size: 0.9rem; margin-bottom: 5px;">國家</label>
                        <input type="text" name="country" placeholder="日本" required style="width: 100%;">
                    </div>
                    <div style="flex: 1;">
                        <label style="display: block; font-size: 0.9rem; margin-bottom: 5px;">城市</label>
                        <input type="text" name="city" placeholder="東京" style="width: 100%;">
                    </div>
                </div>

                <div class="form-row" style="display: flex; gap: 10px; margin-bottom: 18px;">
                    <div style="flex: 1;">
                        <label style="display: block; font-size: 0.9rem; margin-bottom: 5px;">開始日期</label>
                        <input type="date" name="startDate" required style="width: 100%;">
                    </div>
                    <div style="flex: 1;">
                        <label style="display: block; font-size: 0.9rem; margin-bottom: 5px;">結束日期</label>
                        <input type="date" name="endDate" required style="width: 100%;">
                    </div>
                </div>

                <div class="form-group">
                    <label>封面圖片網址</label>
                    <input type="url" name="coverImageUrl" placeholder="https://images.unsplash.com/...">
                </div>

                <div class="form-group">
                    <label>旅程狀態</label>
                    <select name="status">
                        <option value="規劃中">規劃中</option>
                        <option value="即將出發">即將出發</option>
                        <option value="已完成">已完成</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">建立旅程</button>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
